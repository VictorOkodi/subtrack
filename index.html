<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Reminder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            color: #64748b;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        .form-section {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .form-section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .services-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .service-btn {
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .service-btn:hover {
            border-color: #3b82f6;
            background: #f0f4ff;
        }

        .service-btn.active {
            border-color: #3b82f6;
            background: #3b82f6;
            color: white;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .list-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .filter-bar {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .filter-btn:hover:not(.active) {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .subscription-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 4px solid #3b82f6;
            animation: slideInUp 0.5s ease-out;
        }

        .subscription-card:hover {
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .subscription-card.urgent {
            border-left-color: #ef4444;
            background: #fff5f5;
        }

        .subscription-card.warning {
            border-left-color: #f59e0b;
            background: #fffbf0;
        }

        .subscription-info {
            flex: 1;
        }

        .subscription-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subscription-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: #64748b;
        }

        .detail-label {
            font-weight: 600;
            color: #475569;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.urgent {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.ok {
            background: #dcfce7;
            color: #15803d;
        }

        .subscription-actions {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .btn-icon {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
        }

        .btn-edit:hover {
            background: #2563eb;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .stats-bar {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .form-section {
                position: static;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .subscription-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .subscription-actions {
                margin-left: 0;
                margin-top: 16px;
                width: 100%;
            }

            .btn-icon {
                flex: 1;
            }

            .subscription-details {
                grid-template-columns: 1fr;
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: white;
            padding: 28px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            animation: slideInUp 0.3s ease-out;
        }

        .modal-content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: #e2e8f0;
            color: #1e293b;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            animation: slideInUp 0.3s ease-out;
            z-index: 2000;
            max-width: 300px;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Subscription Reminder</h1>
            <p>Keep track of your monthly subscriptions and never miss a renewal</p>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2>➕ Add Subscription</h2>
                <form id="subscriptionForm">
                    <div class="form-group">
                        <label>Popular Services</label>
                        <div class="services-list">
                            <button type="button" class="service-btn" data-service="Netflix">Netflix</button>
                            <button type="button" class="service-btn" data-service="Spotify">Spotify</button>
                            <button type="button" class="service-btn" data-service="YouTube">YouTube</button>
                            <button type="button" class="service-btn" data-service="Discord">Discord</button>
                            <button type="button" class="service-btn" data-service="Telegram">Telegram</button>
                            <button type="button" class="service-btn" data-service="X">X</button>
                            <button type="button" class="service-btn" data-service="Canva">Canva</button>
                            <button type="button" class="service-btn" data-service="CapCut">CapCut</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="serviceName">Service Name *</label>
                        <input type="text" id="serviceName" placeholder="e.g., Spotify, Netflix" required>
                    </div>

                    <div class="form-group">
                        <label for="cost">Monthly Cost ($) *</label>
                        <input type="number" id="cost" placeholder="e.g., 9.99" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="renewalDate">Renewal Date *</label>
                        <input type="date" id="renewalDate" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="">Select Category</option>
                            <option value="streaming">Streaming</option>
                            <option value="social">Social Media</option>
                            <option value="productivity">Productivity</option>
                            <option value="design">Design</option>
                            <option value="music">Music</option>
                            <option value="gaming">Gaming</option>
                            <option value="cloud">Cloud Storage</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes (Optional)</label>
                        <textarea id="notes" placeholder="Add any notes..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Add Subscription</button>
                </form>
            </div>

            <div class="list-section">
                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value" id="totalSubs">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalCost">$0</div>
                        <div class="stat-label">Monthly Cost</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="urgentCount">0</div>
                        <div class="stat-label">Renewing Soon</div>
                    </div>
                </div>

                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="streaming">Streaming</button>
                    <button class="filter-btn" data-filter="social">Social Media</button>
                    <button class="filter-btn" data-filter="productivity">Productivity</button>
                    <button class="filter-btn" data-filter="design">Design</button>
                    <button class="filter-btn" data-filter="music">Music</button>
                    <button class="filter-btn" data-filter="gaming">Gaming</button>
                    <button class="filter-btn" data-filter="cloud">Cloud Storage</button>
                    <button class="filter-btn" data-filter="other">Other</button>
                </div>

                <div id="subscriptionsList"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>Edit Subscription</h2>
            <form id="editForm">
                <div class="form-group">
                    <label for="editServiceName">Service Name</label>
                    <input type="text" id="editServiceName" required>
                </div>
                <div class="form-group">
                    <label for="editCost">Monthly Cost ($)</label>
                    <input type="number" id="editCost" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="editRenewalDate">Renewal Date</label>
                    <input type="date" id="editRenewalDate" required>
                </div>
                <div class="form-group">
                    <label for="editCategory">Category</label>
                    <select id="editCategory">
                        <option value="">Select Category</option>
                        <option value="streaming">Streaming</option>
                        <option value="social">Social Media</option>
                        <option value="productivity">Productivity</option>
                        <option value="design">Design</option>
                        <option value="music">Music</option>
                        <option value="gaming">Gaming</option>
                        <option value="cloud">Cloud Storage</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editNotes">Notes</label>
                    <textarea id="editNotes"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let subscriptions = [];
        let currentEditId = null;
        let currentFilter = 'all';

        function initApp() {
            loadSubscriptions();
            renderSubscriptions();
            setupEventListeners();
            setTodayDate();
        }

        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('renewalDate').value = today;
        }

        function setupEventListeners() {
            document.getElementById('subscriptionForm').addEventListener('submit', handleAddSubscription);
            document.getElementById('editForm').addEventListener('submit', handleEditSubscription);
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', handleFilterChange);
            });

            document.querySelectorAll('.service-btn').forEach(btn => {
                btn.addEventListener('click', handleServiceSelect);
            });

            document.getElementById('editModal').addEventListener('click', (e) => {
                if (e.target.id === 'editModal') closeEditModal();
            });
        }

        function handleServiceSelect(e) {
            e.preventDefault();
            document.querySelectorAll('.service-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('serviceName').value = e.target.dataset.service;
        }

        function handleFilterChange(e) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;
            renderSubscriptions();
        }

        function handleAddSubscription(e) {
            e.preventDefault();

            const subscription = {
                id: Date.now(),
                serviceName: document.getElementById('serviceName').value.trim(),
                cost: parseFloat(document.getElementById('cost').value),
                renewalDate: document.getElementById('renewalDate').value,
                category: document.getElementById('category').value,
                notes: document.getElementById('notes').value.trim(),
                createdAt: new Date().toISOString()
            };

            if (!subscription.serviceName || !subscription.cost || !subscription.renewalDate) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            subscriptions.push(subscription);
            saveSubscriptions();
            renderSubscriptions();
            e.target.reset();
            setTodayDate();
            document.querySelectorAll('.service-btn').forEach(btn => btn.classList.remove('active'));
            showToast('Subscription added successfully!', 'success');
        }

        function handleEditSubscription(e) {
            e.preventDefault();

            const updated = subscriptions.find(sub => sub.id === currentEditId);
            if (!updated) return;

            updated.serviceName = document.getElementById('editServiceName').value.trim();
            updated.cost = parseFloat(document.getElementById('editCost').value);
            updated.renewalDate = document.getElementById('editRenewalDate').value;
            updated.category = document.getElementById('editCategory').value;
            updated.notes = document.getElementById('editNotes').value.trim();

            saveSubscriptions();
            renderSubscriptions();
            closeEditModal();
            showToast('Subscription updated successfully!', 'success');
        }

        function openEditModal(id) {
            const subscription = subscriptions.find(sub => sub.id === id);
            if (!subscription) return;

            currentEditId = id;
            document.getElementById('editServiceName').value = subscription.serviceName;
            document.getElementById('editCost').value = subscription.cost;
            document.getElementById('editRenewalDate').value = subscription.renewalDate;
            document.getElementById('editCategory').value = subscription.category;
            document.getElementById('editNotes').value = subscription.notes;

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditId = null;
        }

        function deleteSubscription(id) {
            if (confirm('Are you sure you want to delete this subscription?')) {
                subscriptions = subscriptions.filter(sub => sub.id !== id);
                saveSubscriptions();
                renderSubscriptions();
                showToast('Subscription deleted successfully!', 'success');
            }
        }

        function getDaysUntilRenewal(renewalDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const renewal = new Date(renewalDate);
            renewal.setHours(0, 0, 0, 0);
            const diff = renewal - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        function getStatusBadge(daysUntilRenewal) {
            if (daysUntilRenewal < 0) {
                return { class: 'urgent', text: 'Overdue' };
            } else if (daysUntilRenewal === 0) {
                return { class: 'urgent', text: 'Today' };
            } else if (daysUntilRenewal <= 3) {
                return { class: 'urgent', text: `In ${daysUntilRenewal} days` };
            } else if (daysUntilRenewal <= 7) {
                return { class: 'warning', text: `In ${daysUntilRenewal} days` };
            }
            return { class: 'ok', text: `In ${daysUntilRenewal} days` };
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderSubscriptions() {
            const filtered = currentFilter === 'all' 
                ? subscriptions 
                : subscriptions.filter(sub => sub.category === currentFilter);

            const sorted = [...filtered].sort((a, b) => {
                const daysA = getDaysUntilRenewal(a.renewalDate);
                const daysB = getDaysUntilRenewal(b.renewalDate);
                return daysA - daysB;
            });

            updateStats();

            const container = document.getElementById('subscriptionsList');
            
            if (sorted.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No subscriptions yet</h3>
                        <p>Add your first subscription to get started!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = sorted.map(sub => {
                const daysUntilRenewal = getDaysUntilRenewal(sub.renewalDate);
                const status = getStatusBadge(daysUntilRenewal);

                return `
                    <div class="subscription-card ${status.class}">
                        <div class="subscription-info">
                            <div class="subscription-name">
                                ${sub.serviceName}
                                <span class="badge ${status.class}">${status.text}</span>
                            </div>
                            <div class="subscription-details">
                                <div class="detail-item">
                                    <span class="detail-label">💰 Cost:</span>
                                    $${sub.cost.toFixed(2)}/month
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">📅 Renews:</span>
                                    ${formatDate(sub.renewalDate)}
                                </div>
                                ${sub.category ? `
                                    <div class="detail-item">
                                        <span class="detail-label">🏷️ Category:</span>
                                        ${sub.category.charAt(0).toUpperCase() + sub.category.slice(1)}
                                    </div>
                                ` : ''}
                                ${sub.notes ? `
                                    <div class="detail-item">
                                        <span class="detail-label">📝 Notes:</span>
                                        ${sub.notes}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        <div class="subscription-actions">
                            <button class="btn-icon btn-edit" onclick="openEditModal(${sub.id})">✏️ Edit</button>
                            <button class="btn-icon btn-delete" onclick="deleteSubscription(${sub.id})">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const total = subscriptions.length;
            const totalCost = subscriptions.reduce((sum, sub) => sum + sub.cost, 0);
            const urgent = subscriptions.filter(sub => {
                const days = getDaysUntilRenewal(sub.renewalDate);
                return days <= 3;
            }).length;

            document.getElementById('totalSubs').textContent = total;
            document.getElementById('totalCost').textContent = `$${totalCost.toFixed(2)}`;
            document.getElementById('urgentCount').textContent = urgent;
        }

        function saveSubscriptions() {
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
        }

        function loadSubscriptions() {
            const saved = localStorage.getItem('subscriptions');
            subscriptions = saved ? JSON.parse(saved) : [];
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInUp 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        initApp();
    </script>
</body>
</html>
